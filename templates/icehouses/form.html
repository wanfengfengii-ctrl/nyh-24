{% extends "base.html" %}

{% block title %}{% if house %}编辑冰窖{% else %}新增冰窖{% endif %} - 冰窖档案{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('icehouses') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div>
        <h2 class="fw-bold mb-1">{% if house %}编辑冰窖{% else %}新增冰窖{% endif %}</h2>
        <p class="text-muted mb-0">填写冰窖基本信息</p>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="code" class="form-label">冰窖编号 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="code" name="code"
                           value="{{ house.code if house else '' }}" required
                           placeholder="例如：BJ-001">
                    <div class="form-text">冰窖编号不能重复</div>
                </div>
                <div class="col-md-6">
                    <label for="location" class="form-label">位置 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="location" name="location"
                           value="{{ house.location if house else '' }}" required
                           placeholder="例如：北京市西城区地安门外大街">
                </div>
                <div class="col-md-4">
                    <label for="build_year" class="form-label">建造年代</label>
                    <input type="number" class="form-control" id="build_year" name="build_year"
                           value="{{ house.build_year if house else '' }}"
                           placeholder="例如：1890">
                </div>
                <div class="col-md-4">
                    <label for="capacity" class="form-label">容量(块) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="capacity" name="capacity"
                           value="{{ house.capacity if house else '' }}" required min="1"
                           placeholder="例如：500">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch"
                               id="is_open" name="is_open"
                               {% if house and house.is_open %}checked{% endif %}>
                        <label class="form-check-label" for="is_open">开放状态</label>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="bi bi-save me-1"></i>保存
                </button>
                <a href="{{ url_for('icehouses') }}" class="btn btn-outline-secondary">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
