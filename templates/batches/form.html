{% extends "base.html" %}

{% block title %}{% if batch %}编辑批次{% else %}新增批次{% endif %} - 藏冰批次{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('batches') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div>
        <h2 class="fw-bold mb-1">{% if batch %}编辑批次{% else %}新增批次{% endif %}</h2>
        <p class="text-muted mb-0">填写藏冰批次信息</p>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="ice_house_id" class="form-label">所属冰窖 <span class="text-danger">*</span></label>
                    <select class="form-select" id="ice_house_id" name="ice_house_id" required>
                        <option value="">请选择冰窖</option>
                        {% for h in houses %}
                        <option value="{{ h.id }}" {% if batch and batch.ice_house_id == h.id %}selected{% endif %}>
                            {{ h.code }} - {{ h.location }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="entry_date" class="form-label">入窖日期 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="entry_date" name="entry_date"
                           value="{{ batch.entry_date if batch else '' }}" required>
                    <div class="form-text">不能晚于当前日期</div>
                </div>
                <div class="col-md-4">
                    <label for="ice_count" class="form-label">冰块数量(块) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="ice_count" name="ice_count"
                           value="{{ batch.ice_count if batch else '' }}" required min="1"
                           oninput="updateRemaining()">
                </div>
                <div class="col-md-4">
                    <label for="expected_storage_period" class="form-label">预计保存期(天) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="expected_storage_period" name="expected_storage_period"
                           value="{{ batch.expected_storage_period if batch else '' }}" required min="1">
                </div>
                <div class="col-md-4">
                    <label for="current_remaining" class="form-label">当前剩余量(块)</label>
                    <input type="number" class="form-control" id="current_remaining" name="current_remaining"
                           value="{{ batch.current_remaining if batch else '' }}" min="0">
                    <div class="form-text">不填则默认等于入窖数量</div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="bi bi-save me-1"></i>保存
                </button>
                <a href="{{ url_for('batches') }}" class="btn btn-outline-secondary">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function updateRemaining() {
    const iceCount = document.getElementById('ice_count').value;
    const remainingInput = document.getElementById('current_remaining');
    if (!remainingInput.value && iceCount) {
        remainingInput.value = iceCount;
    }
}
</script>
{% endblock %}
