{% extends "base.html" %}

{% block title %}{% if repair %}编辑工单{% else %}新增工单{% endif %} - 修缮工单{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('repairs') }}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div>
        <h2 class="fw-bold mb-1">{% if repair %}编辑工单{% else %}新增工单{% endif %}</h2>
        <p class="text-muted mb-0">填写修缮工单信息</p>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="ice_house_id" class="form-label">所属冰窖 <span class="text-danger">*</span></label>
                    <select class="form-select" id="ice_house_id" name="ice_house_id" required>
                        <option value="">请选择冰窖</option>
                        {% for h in houses %}
                        <option value="{{ h.id }}" {% if repair and repair.ice_house_id == h.id %}selected{% endif %}>
                            {{ h.code }} - {{ h.location }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="report_date" class="form-label">报修日期 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="report_date" name="report_date"
                           value="{{ repair.report_date if repair else '' }}" required>
                    <div class="form-text">不能晚于当前日期</div>
                </div>
                <div class="col-12">
                    <label for="issue_description" class="form-label">问题描述 <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="issue_description" name="issue_description" rows="3" required
                              placeholder="请详细描述需要修缮的问题">{{ repair.issue_description if repair else '' }}</textarea>
                </div>

                {% if repair %}
                <div class="col-12 mt-3">
                    <h6 class="text-primary border-bottom pb-2 mb-3">
                        <i class="bi bi-wrench me-1"></i>修缮信息
                    </h6>
                </div>
                <div class="col-md-4">
                    <label for="status" class="form-label">工单状态</label>
                    <select class="form-select" id="status" name="status">
                        <option value="pending" {% if repair.status == 'pending' %}selected{% endif %}>待处理</option>
                        <option value="in_progress" {% if repair.status == 'in_progress' %}selected{% endif %}>进行中</option>
                        <option value="completed" {% if repair.status == 'completed' %}selected{% endif %}>已完成</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="repair_date" class="form-label">修缮日期</label>
                    <input type="date" class="form-control" id="repair_date" name="repair_date"
                           value="{{ repair.repair_date if repair and repair.repair_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label for="repair_cost" class="form-label">修缮费用(元)</label>
                    <input type="number" step="0.01" class="form-control" id="repair_cost" name="repair_cost"
                           value="{{ repair.repair_cost if repair and repair.repair_cost > 0 else '' }}" min="0">
                </div>
                <div class="col-12">
                    <label for="notes" class="form-label">备注</label>
                    <textarea class="form-control" id="notes" name="notes" rows="2"
                              placeholder="修缮备注信息">{{ repair.notes if repair else '' }}</textarea>
                </div>
                {% endif %}
            </div>

            <div class="mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-primary me-2">
                    <i class="bi bi-save me-1"></i>保存
                </button>
                <a href="{{ url_for('repairs') }}" class="btn btn-outline-secondary">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
